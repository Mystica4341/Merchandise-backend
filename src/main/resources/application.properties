spring.application.name=merchandise
springdoc.swagger-ui.path=/swagger
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/merchandise_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:merchandise_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:merchandise_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect